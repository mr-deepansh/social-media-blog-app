name: Deploy Social Media App to Production

on:
  push:
    branches:
      - production # Use the production branch for deployment

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Check out the code
      - name: Checkout Code
        uses: actions/checkout@v3

      # Step 2: Set up Node.js
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "20" # Replace with your Node.js version

      # Step 3: Install dependencies
      - name: Install Dependencies
        run: npm ci

      # Step 4: Run tests (optional, you can skip if not needed)
      - name: Run Tests
        run: npm test

      # Step 5: Build Docker image
      - name: Build Docker Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/social-media-app:latest .

      # Step 6: Log in to DockerHub
      - name: Log in to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Step 7: Push Docker Image to DockerHub
      - name: Push Docker Image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/social-media-app:latest

      # Step 8: Deploy to Production Server via SSH
      - name: Deploy via SSH to Production Server
        uses: appleboy/ssh-action@v0.1.12
        with:
          host: ${{ secrets.SERVER_IP }} # Your server IP
          username: ${{ secrets.SSH_USER }} # Your SSH user
          key: ${{ secrets.SSH_PRIVATE_KEY }} # Your SSH private key
          script: |
            # Pull the latest image from DockerHub
            docker pull ${{ secrets.DOCKER_USERNAME }}/social-media-app:latest

            # Stop and remove the existing container if it's running
            docker stop social-media-app || true
            docker rm social-media-app || true

            # Run the Docker container with the latest image
            docker run -d --name social-media-app -p 5000:5000 --env-file .env ${{ secrets.DOCKER_USERNAME }}/social-media-app:latest
